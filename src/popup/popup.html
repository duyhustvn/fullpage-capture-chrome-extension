<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Full Page Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="../assets/icons/icon32.png" alt="" class="logo">
      <span class="title">Full Page Capture</span>
      <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
    </header>

    <div class="format-row">
      <span class="format-label">Format:</span>
      <div class="format-toggle">
        <button id="fmt-png" class="fmt-btn active" data-fmt="png">PNG</button>
        <button id="fmt-pdf" class="fmt-btn" data-fmt="pdf">PDF</button>
      </div>
    </div>

    <div id="pdf-opts" class="pdf-opts hidden">
      <label class="opt-label" for="pdf-size">Page size:</label>
      <select id="pdf-size" class="opt-select">
        <option value="fit">Fit to image</option>
        <option value="a4">A4</option>
        <option value="letter">Letter</option>
      </select>
    </div>

    <div class="buttons">
      <button id="btn-full-page" class="btn btn-primary">
        <span class="btn-icon">📸</span> Full Page
      </button>
      <button id="btn-visible" class="btn btn-secondary">
        <span class="btn-icon">📷</span> Visible Only
      </button>
    </div>

    <div id="progress-wrap" class="progress-wrap hidden">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
